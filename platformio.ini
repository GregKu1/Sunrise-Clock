framework = arduino
lib_deps = 
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    madhephaestus/ESP32Encoder @ ^0.12.0
    olikraus/U8g2 @ ^2.36.18
    C:\Users\griku\Downloads\rbdimmerESP32-main.zip


[env:lolin_s2_mini]
board = lolin_s2_mini

[env:esp32dev]
board = esp32dev
build_flags = -D LED_BUILTIN=2
